<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note – Ben Pomeranz</title>
    <link rel="icon" href="/favicon.ico">
    <!-- apply the saved colour mode before paint (no flash) -->
    <script>try{var m=localStorage.getItem("site-mode");if(m==="brick"||m==="alpine")document.documentElement.setAttribute("data-mode",m);}catch(e){}</script>
    <link rel="stylesheet" href="/styles.css?v=9">
    <link rel="stylesheet" href="/notes/note.css?v=3">
    <!-- KaTeX for LaTeX rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
</head>
<body class="note-page">
    <div id="nav-placeholder"></div>
    <script src="/nav.js?v=3"></script>

    <article class="note">
        <h1 id="note-title">…</h1>
        <p class="note-date-line muted" id="note-date"></p>
        <div id="note-body" class="note-body"></div>
    </article>

    <!-- Markdown + KaTeX, loaded then handed to the renderer -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="/notes/note.js?v=5"></script>
</body>
</html>
