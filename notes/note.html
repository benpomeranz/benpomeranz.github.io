<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note – Ben Pomeranz</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="/styles.css?v=4">
    <link rel="stylesheet" href="/notes/note.css?v=2">
    <!-- KaTeX for LaTeX rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
</head>
<body class="note-page">
    <div id="nav-placeholder"></div>
    <script>
        fetch("/nav.html")
        .then(r => r.text())
        .then(html => { document.getElementById("nav-placeholder").innerHTML = html; });
    </script>

    <article class="note">
        <h1 id="note-title">…</h1>
        <p class="note-date-line muted" id="note-date"></p>
        <div id="note-body" class="note-body"></div>
    </article>

    <!-- Markdown + KaTeX, loaded then handed to the renderer -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="/notes/note.js?v=3"></script>
</body>
</html>
